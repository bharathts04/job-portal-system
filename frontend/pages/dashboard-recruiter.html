<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Dashboard - JobHub</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            margin-top: 6rem;
            padding-bottom: 4rem;
        }
        @media (max-width: 768px) {
            .dashboard-container { grid-template-columns: 1fr; }
        }
        .dashboard-panel {
            background: white;
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-md);
        }
    </style>
</head>
<body style="background-color: var(--bg-color);">

    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="../index.html" class="nav-brand">
                <i class="fa-solid fa-briefcase"></i> JobHub
            </a>
            <div class="nav-links" id="navLinks">
                <a href="../index.html">Home</a>
                <button class="btn btn-outline" onclick="logout()">Log Out</button>
            </div>
        </div>
    </nav>

    <div class="container dashboard-container">
        <!-- Post Job Panel -->
        <div class="dashboard-panel">
            <h2 style="margin-bottom: 1.5rem;"><i class="fa-solid fa-plus-circle"></i> Post a New Job</h2>
            <form id="postJobForm">
                <div class="form-group">
                    <label class="form-label" for="title">Job Title</label>
                    <input type="text" id="title" class="form-control" required placeholder="e.g. Senior Software Engineer">
                </div>
                <div class="form-group">
                    <label class="form-label" for="companyName">Company Name</label>
                    <input type="text" id="companyName" class="form-control" required placeholder="e.g. Google, Apple">
                </div>
                <div class="form-group">
                    <label class="form-label" for="location">Location</label>
                    <input type="text" id="location" class="form-control" required placeholder="e.g. Remote, New York">
                </div>
                <div class="form-group">
                    <label class="form-label" for="salary">Salary Range</label>
                    <input type="text" id="salary" class="form-control" placeholder="e.g. $100k - $130k">
                </div>
                <div class="form-group">
                    <label class="form-label" for="skills">Skills (comma separated)</label>
                    <input type="text" id="skills" class="form-control" placeholder="e.g. Java, React, SQL">
                </div>
                <div class="form-group">
                    <label class="form-label" for="description">Job Description</label>
                    <textarea id="description" class="form-control" rows="5" required placeholder="Describe the role..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Publish Job</button>
            </form>
        </div>

        <!-- Posted Jobs & Applications Panel -->
        <div class="dashboard-panel">
            <h2 style="margin-bottom: 1.5rem;"><i class="fa-solid fa-list-check"></i> My Job Postings</h2>
            <div id="myJobsList" style="display: flex; flex-direction: column; gap: 1rem;">
                <!-- Dynamically populated -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i class="fa-solid fa-circle-info" id="toastIcon"></i>
        <span id="toastMsg">Notification</span>
    </div>

    <!-- Applicant Profile Modal -->
    <div id="profileModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div class="modal-content" style="background: white; border-radius: var(--radius-lg); padding: 2rem; width: 90%; max-width: 500px; box-shadow: var(--shadow-lg); position: relative;">
            <button onclick="closeProfileModal()" style="position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary);">&times;</button>
            <h2 id="modalName" style="margin-bottom: 0.5rem; color: var(--text-primary);">Applicant Name</h2>
            <p id="modalEmail" style="color: var(--text-secondary); margin-bottom: 1.5rem;">email@example.com</p>
            <div style="margin-bottom: 1rem;">
                <strong><i class="fa-solid fa-graduation-cap"></i> Education:</strong>
                <p id="modalEducation" style="color: var(--text-secondary); margin-top: 0.25rem;">Not provided</p>
            </div>
            <div style="margin-bottom: 1rem;">
                <strong><i class="fa-solid fa-code"></i> Skills:</strong>
                <p id="modalSkills" style="color: var(--text-secondary); margin-top: 0.25rem;">Not provided</p>
            </div>
            <div style="margin-bottom: 1.5rem;">
                <strong><i class="fa-solid fa-briefcase"></i> Experience:</strong>
                <p id="modalExperience" style="color: var(--text-secondary); margin-top: 0.25rem;">Not provided</p>
            </div>
            <div id="modalResume" style="text-align: center; border-top: 1px solid var(--border-color); padding-top: 1rem;">
                <!-- Resume link goes here -->
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        // Redirect if not recruiter
        document.addEventListener('DOMContentLoaded', () => {
            if (!isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }
            const user = JSON.parse(localStorage.getItem('user'));
            if (user.role !== 'ROLE_RECRUITER' && user.role !== 'ROLE_ADMIN') {
                window.location.href = '../index.html';
                return;
            }
            
            fetchMyPostedJobs();
        });

        // Handle Job Posting
        document.getElementById('postJobForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Publishing...';
            btn.disabled = true;

            const jobData = {
                title: document.getElementById('title').value,
                companyName: document.getElementById('companyName').value,
                location: document.getElementById('location').value,
                salary: document.getElementById('salary').value,
                skills: document.getElementById('skills').value,
                description: document.getElementById('description').value
            };

            try {
                const response = await fetch(`${API_URL}/jobs`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(jobData)
                });

                if (response.ok) {
                    showToast('Job posted successfully!', 'success');
                    e.target.reset();
                    fetchMyPostedJobs(); // Refresh list
                } else {
                    showToast('Failed to post job', 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('An error occurred', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // Fetch and display jobs posted by this recruiter
        async function fetchMyPostedJobs() {
            const container = document.getElementById('myJobsList');
            container.innerHTML = '<div style="text-align: center;"><i class="fa-solid fa-spinner fa-spin fa-2x" style="color:var(--text-secondary)"></i></div>';
            
            try {
                // In a complete implementation, there should be an endpoint like /api/jobs/me
                // Since we don't have a specific recruiter filter in backend currently, we fetch all and filter client side
                // Wait, let's just fetch all jobs and filter by recruiter id
                const response = await fetch(`${API_URL}/jobs`);
                const jobs = await response.json();
                const userId = JSON.parse(localStorage.getItem('user')).id;
                
                const myJobs = jobs.filter(job => job.postedBy && job.postedBy.id === userId);
                
                if (myJobs.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 2rem;">You haven\'t posted any jobs yet.</p>';
                    return;
                }

                container.innerHTML = '';
                for (const job of myJobs) {
                    // Fetch applicants for this job
                    const appResponse = await fetch(`${API_URL}/applications/job/${job.id}`, {
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                    });
                    const applicants = await appResponse.json();

                    const jobEl = document.createElement('div');
                    jobEl.style.cssText = 'border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 1.5rem;';
                    jobEl.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                            <div>
                                <h3 style="color: var(--text-primary); margin-bottom: 0.25rem;">${job.title}</h3>
                                <span style="color: var(--text-secondary); font-size: 0.9rem;">${job.location} • ${new Date(job.createdAt).toLocaleDateString()}</span>
                            </div>
                            <button class="btn btn-outline" style="padding: 0.25rem 0.75rem; border-color: var(--danger); color: var(--danger);" onclick="deleteJob(${job.id})">Delete</button>
                        </div>
                        <div style="background: var(--bg-color); padding: 1rem; border-radius: var(--radius-sm);">
                            <h4 style="font-size: 0.95rem; margin-bottom: 0.5rem;">Applicants (${applicants.length})</h4>
                            ${applicants.length > 0 ? `<ul style="font-size: 0.9rem; color: var(--text-secondary); margin-left: 1rem; list-style: circle;">
                                ${applicants.map(app => {
                                    window.applicantData = window.applicantData || {};
                                    window.applicantData[app.id] = app.applicant;
                                    return `
                                    <li style="margin-bottom: 0.25rem;">
                                        <strong>${app.applicant.username}</strong> 
                                        <button onclick="viewProfile(${app.id})" style="margin-left: 10px; border:none; background:none; color:var(--primary-color); cursor:pointer;" title="View Profile"><i class="fa-solid fa-user"></i> View Profile</button>
                                        ${app.applicant.resumeUrl ? `<a href="http://localhost:8081${app.applicant.resumeUrl}" target="_blank" style="margin-left:5px; color:var(--secondary-color);"><i class="fa-solid fa-file-pdf"></i> Resume</a>` : ''}
                                        - Status: <span style="color: var(--primary-color); font-weight: 600;">${app.status}</span>
                                        ${app.status === 'APPLIED' ? `
                                        <button onclick="updateAppStatus(${app.id}, 'SHORTLISTED')" style="margin-left: 10px; border:none; background:none; color:var(--success); cursor:pointer;" title="Shortlist"><i class="fa-solid fa-check"></i> Accept</button>
                                        <button onclick="updateAppStatus(${app.id}, 'REJECTED')" style="margin-left: 5px; border:none; background:none; color:var(--danger); cursor:pointer;" title="Reject"><i class="fa-solid fa-xmark"></i> Reject</button>
                                        ` : ''}
                                    </li>
                                    `;
                                }).join('')}
                            </ul>` : '<p style="font-size: 0.9rem; color: var(--text-secondary);">No applications yet.</p>'}
                        </div>
                    `;
                    container.appendChild(jobEl);
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = '<p style="color: var(--danger);">Failed to load jobs.</p>';
            }
        }

        async function deleteJob(jobId) {
            if(!confirm("Are you sure you want to delete this job?")) return;
            try {
                const response = await fetch(`${API_URL}/jobs/${jobId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if(response.ok) {
                    showToast("Job deleted successfully", "success");
                    fetchMyPostedJobs();
                } else {
                    showToast("Failed to delete", "error");
                }
            } catch(e) {
                console.error(e);
            }
        }

        async function updateAppStatus(appId, status) {
            try {
                const response = await fetch(`${API_URL}/applications/${appId}/status?status=${status}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if(response.ok) {
                    showToast("Status updated!", "success");
                    fetchMyPostedJobs();
                } else {
                    showToast("Failed to update status", "error");
                }
            } catch(e) {
                console.error(e);
            }
        }

        function viewProfile(appId) {
            const applicant = window.applicantData[appId];
            if (!applicant) return;
            
            document.getElementById('modalName').textContent = applicant.username;
            document.getElementById('modalEmail').textContent = applicant.email;
            document.getElementById('modalEducation').textContent = applicant.education || 'Not provided';
            document.getElementById('modalSkills').textContent = applicant.skills || 'Not provided';
            document.getElementById('modalExperience').textContent = applicant.experience || 'Not provided';
            
            const resumeContainer = document.getElementById('modalResume');
            if (applicant.resumeUrl) {
                resumeContainer.innerHTML = `<a href="http://localhost:8081${applicant.resumeUrl}" target="_blank" class="btn btn-outline" style="display: inline-block;"><i class="fa-solid fa-file-pdf"></i> View Resume</a>`;
            } else {
                resumeContainer.innerHTML = `<p style="color: var(--text-secondary); font-size: 0.9rem;">No resume uploaded</p>`;
            }
            
            document.getElementById('profileModal').style.display = 'flex';
        }

        function closeProfileModal() {
            document.getElementById('profileModal').style.display = 'none';
        }
    </script>
</body>
</html>
