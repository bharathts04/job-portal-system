<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Seeker Dashboard - JobHub</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dashboard-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            margin-top: 6rem;
            padding-bottom: 4rem;
        }
        @media (max-width: 768px) {
            .dashboard-container { grid-template-columns: 1fr; }
        }
        .dashboard-panel {
            background: white;
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-md);
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status-APPLIED { background: #E0E7FF; color: #4338CA; }
        .status-SHORTLISTED { background: #D1FAE5; color: #059669; }
        .status-REJECTED { background: #FEE2E2; color: #DC2626; }
    </style>
</head>
<body style="background-color: var(--bg-color);">

    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="../index.html" class="nav-brand">
                <i class="fa-solid fa-briefcase"></i> JobHub
            </a>
            <div class="nav-links">
                <a href="../index.html">Find Jobs</a>
                <button class="btn btn-outline" onclick="logout()">Log Out</button>
            </div>
        </div>
    </nav>

    <div class="container dashboard-container">
        <!-- Profile Panel -->
        <div class="dashboard-panel" style="align-self: start; text-align: center;">
            <div style="width: 100px; height: 100px; border-radius: 50%; background: var(--border-color); margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--text-secondary);">
                <i class="fa-solid fa-user"></i>
            </div>
            <h3 id="userNameDisplay" style="margin-bottom: 0.5rem; color: var(--text-primary);">User Name</h3>
            <p id="userEmailDisplay" style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem;">user@example.com</p>
            <div style="border-top: 1px solid var(--border-color); padding-top: 1.5rem; margin-top: 1.5rem; text-align: left;">
                <h4 style="margin-bottom: 1rem;">Update Profile</h4>
                <form id="profileForm">
                    <div class="form-group">
                        <label class="form-label" style="font-size: 0.9rem;" for="education">Education</label>
                        <input type="text" id="education" class="form-control" placeholder="e.g. B.S. Computer Science">
                    </div>
                    <div class="form-group">
                        <label class="form-label" style="font-size: 0.9rem;" for="userSkills">Skills</label>
                        <input type="text" id="userSkills" class="form-control" placeholder="e.g. Java, React">
                    </div>
                    <div class="form-group">
                        <label class="form-label" style="font-size: 0.9rem;" for="experience">Experience</label>
                        <input type="text" id="experience" class="form-control" placeholder="e.g. 3 years as a Developer">
                    </div>
                    <button type="submit" class="btn btn-outline" style="width: 100%; margin-bottom: 1rem;">Save Profile</button>
                </form>

                <h4 style="margin-bottom: 1rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">Resume</h4>
                <form id="resumeForm">
                    <input type="file" id="resumeFile" class="form-control" accept=".pdf,.doc,.docx" style="margin-bottom: 0.5rem;" required>
                    <button type="submit" class="btn btn-primary" style="width: 100%;"><i class="fa-solid fa-file-arrow-up"></i> Upload Resume</button>
                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem; text-align: center;">Supported: PDF, DOCX (Max 5MB)</p>
                </form>
                <div id="currentResumeLink" style="margin-top: 1rem; text-align: center;"></div>
            </div>
        </div>

        <!-- Applications Panel -->
        <div class="dashboard-panel">
            <h2 style="margin-bottom: 1.5rem;"><i class="fa-solid fa-clipboard-list"></i> My Applications</h2>
            <div id="applicationsList" style="display: flex; flex-direction: column; gap: 1rem;">
                <!-- Dynamically populated -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i class="fa-solid fa-circle-info" id="toastIcon"></i>
        <span id="toastMsg">Notification</span>
    </div>

    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }
            const user = JSON.parse(localStorage.getItem('user'));
            if (user.role !== 'ROLE_SEEKER') {
                window.location.href = '../index.html';
                return;
            }

            document.getElementById('userNameDisplay').textContent = user.username;
            document.getElementById('userEmailDisplay').textContent = user.email;
            
            fetchProfile();
            fetchMyApplications();
        });

        async function fetchProfile() {
            try {
                const response = await fetch(`${API_URL}/users/profile`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (response.ok) {
                    const profile = await response.json();
                    if (profile.education) document.getElementById('education').value = profile.education;
                    if (profile.skills) document.getElementById('userSkills').value = profile.skills;
                    if (profile.experience) document.getElementById('experience').value = profile.experience;
                    if (profile.resumeUrl) {
                        document.getElementById('currentResumeLink').innerHTML = `<a href="http://localhost:8081${profile.resumeUrl}" target="_blank" style="color: var(--secondary-color);"><i class="fa-solid fa-file-pdf"></i> View Current Resume</a>`;
                    }
                }
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
            
            const profileData = {
                education: document.getElementById('education').value,
                skills: document.getElementById('userSkills').value,
                experience: document.getElementById('experience').value
            };

            try {
                const response = await fetch(`${API_URL}/users/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(profileData)
                });
                if (response.ok) {
                    showToast('Profile updated!', 'success');
                } else {
                    showToast('Failed to update profile', 'error');
                }
            } catch (err) {
                showToast('Error', 'error');
            }
            btn.innerHTML = 'Save Profile';
        });

        document.getElementById('resumeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading...';
            
            const fileInput = document.getElementById('resumeFile');
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch(`${API_URL}/users/upload-resume`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: formData
                });
                if (response.ok) {
                    showToast('Resume uploaded!', 'success');
                    fetchProfile(); // refresh to show link
                } else {
                    showToast('Failed to upload', 'error');
                }
            } catch (err) {
                showToast('Error', 'error');
            }
            btn.innerHTML = '<i class="fa-solid fa-file-arrow-up"></i> Upload Resume';
            e.target.reset();
        });

        async function fetchMyApplications() {
            const container = document.getElementById('applicationsList');
            container.innerHTML = '<div style="text-align: center;"><i class="fa-solid fa-spinner fa-spin fa-2x" style="color:var(--text-secondary)"></i></div>';
            
            try {
                const response = await fetch(`${API_URL}/applications/my-applications`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                if (!response.ok) throw new Error("Failed");
                const applications = await response.json();
                
                if (applications.length === 0) {
                    container.innerHTML = `
                        <div style="text-align: center; padding: 3rem;">
                            <i class="fa-solid fa-folder-open fa-3x" style="color: var(--border-color); margin-bottom: 1rem;"></i>
                            <p style="color: var(--text-secondary);">You haven't applied to any jobs yet.</p>
                            <a href="../index.html" class="btn btn-outline" style="margin-top: 1rem;">Browse Jobs</a>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = '';
                applications.forEach(app => {
                    const el = document.createElement('div');
                    el.style.cssText = 'border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; transition: all var(--transition-fast);';
                    el.onmouseover = () => el.style.borderColor = 'var(--primary-color)';
                    el.onmouseout = () => el.style.borderColor = 'var(--border-color)';
                    
                    el.innerHTML = `
                        <div>
                            <h3 style="color: var(--text-primary); margin-bottom: 0.25rem;">${app.job.title}</h3>
                            <div style="color: var(--text-secondary); font-size: 0.9rem; display: flex; gap: 1rem;">
                                <span><i class="fa-solid fa-building"></i> ${app.job.location}</span>
                                <span><i class="fa-regular fa-clock"></i> Applied on: ${new Date(app.appliedAt).toLocaleDateString()}</span>
                            </div>
                        </div>
                        <div>
                            <span class="status-badge status-${app.status}">${app.status}</span>
                        </div>
                    `;
                    container.appendChild(el);
                });
            } catch (err) {
                console.error(err);
                container.innerHTML = '<p style="color: var(--danger);">Failed to load applications.</p>';
            }
        }
    </script>
</body>
</html>
