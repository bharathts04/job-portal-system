<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - JobHub</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-image: url('../assets/hero_bg.png'); background-size: cover; background-position: center; background-attachment: fixed;">

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="../index.html" class="nav-brand">
                <i class="fa-solid fa-briefcase"></i> JobHub
            </a>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="login.html" class="btn btn-outline">Log In</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container glass-panel" style="margin-top: 6rem;">
            <h2 style="text-align: center; margin-bottom: 2rem;">Create an Account</h2>
            
            <form id="signupForm">
                <div class="form-group">
                    <label class="form-label" for="role">I am a...</label>
                    <select id="role" class="form-control" required>
                        <option value="seeker">Job Seeker</option>
                        <option value="recruiter">Recruiter / Employer</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="form-control" required placeholder="Choose a username">
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="Create a password">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Sign Up
                </button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
                Already have an account? <a href="login.html">Log in</a>
            </p>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i class="fa-solid fa-circle-info" id="toastIcon"></i>
        <span id="toastMsg">Notification</span>
    </div>

    <script src="../js/app.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating account...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password, role })
                });

                if (response.ok) {
                    showToast('Account created successfully!', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    const data = await response.json();
                    showToast(data.message || 'Registration failed', 'error');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                showToast('Server error. Please try again later.', 'error');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
